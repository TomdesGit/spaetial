<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Spaetial background fallback</title>
  <desc id="desc">Fallback image shown when the hero video cannot autoplay.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#020203" />
      <stop offset="100%" stop-color="#11151f" />
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)" />
  <text x="50%" y="47%" fill="#f8fafc" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="96" font-weight="700" text-anchor="middle" dominant-baseline="middle">Spaetial</text>
  <text x="50%" y="60%" fill="#d1d5db" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="28" text-anchor="middle" dominant-baseline="middle">Fallback image for mobile autoplay support</text>
</svg>
